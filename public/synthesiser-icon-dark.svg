<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" width="140" height="120">
  <defs>
    <linearGradient id="prism-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="beam-in-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="beam-out-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam-out-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam-out-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#818cf8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="translate(0, 10)">
    <circle cx="4" cy="28" r="3.5" fill="#64748b" opacity="0.6"/>
    <circle cx="8" cy="48" r="2.5" fill="#64748b" opacity="0.5"/>
    <circle cx="2" cy="68" r="3" fill="#64748b" opacity="0.55"/>
    <circle cx="10" cy="85" r="2" fill="#64748b" opacity="0.45"/>
    <line x1="8" y1="28" x2="42" y2="45" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="48" x2="42" y2="50" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="68" x2="42" y2="58" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="85" x2="42" y2="64" stroke="url(#beam-in-1)" stroke-width="1.2" stroke-linecap="round"/>
    <polygon points="62,12 42,88 100,88" fill="url(#prism-grad)" filter="url(#soft-shadow)" opacity="0.95"/>
    <polygon points="62,22 50,80 88,80" fill="white" opacity="0.06"/>
    <g transform="translate(64, 42)" filter="url(#glow)">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="url(#spark-grad)" opacity="0.95"/>
    </g>
    <line x1="100" y1="46" x2="128" y2="30" stroke="url(#beam-out-1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="58" x2="128" y2="58" stroke="url(#beam-out-2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="70" x2="128" y2="86" stroke="url(#beam-out-3)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="130" y="24" width="10" height="10" rx="2" fill="#818cf8" opacity="0.85"/>
    <rect x="130" y="52" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.85"/>
    <rect x="130" y="80" width="10" height="10" rx="2" fill="#c4b5fd" opacity="0.85"/>
    <line x1="132.5" y1="27.5" x2="137.5" y2="27.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="30.5" x2="136" y2="30.5" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="132.5" y1="55.5" x2="137.5" y2="55.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="58.5" x2="136" y2="58.5" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="132.5" y1="83.5" x2="137.5" y2="83.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="86.5" x2="136" y2="86.5" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
