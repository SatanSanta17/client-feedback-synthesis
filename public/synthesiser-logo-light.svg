<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="prism-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="beam-in-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="beam-out-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam-out-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam-out-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(12, 10)">
    <circle cx="4" cy="38" r="3.5" fill="#94a3b8" opacity="0.5"/>
    <circle cx="8" cy="58" r="2.5" fill="#94a3b8" opacity="0.4"/>
    <circle cx="2" cy="78" r="3" fill="#94a3b8" opacity="0.45"/>
    <circle cx="10" cy="95" r="2" fill="#94a3b8" opacity="0.35"/>
    <line x1="8" y1="38" x2="42" y2="55" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="58" x2="42" y2="60" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="78" x2="42" y2="68" stroke="url(#beam-in-1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="95" x2="42" y2="74" stroke="url(#beam-in-1)" stroke-width="1.2" stroke-linecap="round"/>
    <polygon points="62,22 42,98 100,98" fill="url(#prism-grad)" filter="url(#soft-shadow)" opacity="0.95"/>
    <polygon points="62,32 50,90 88,90" fill="white" opacity="0.08"/>
    <g transform="translate(64, 52)" filter="url(#glow)">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="url(#spark-grad)" opacity="0.9"/>
    </g>
    <line x1="100" y1="56" x2="128" y2="40" stroke="url(#beam-out-1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="68" x2="128" y2="68" stroke="url(#beam-out-2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="80" x2="128" y2="96" stroke="url(#beam-out-3)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="130" y="34" width="10" height="10" rx="2" fill="#6366f1" opacity="0.8"/>
    <rect x="130" y="62" width="10" height="10" rx="2" fill="#8b5cf6" opacity="0.8"/>
    <rect x="130" y="90" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.8"/>
    <line x1="132.5" y1="37.5" x2="137.5" y2="37.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="40.5" x2="136" y2="40.5" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="132.5" y1="65.5" x2="137.5" y2="65.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="68.5" x2="136" y2="68.5" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="132.5" y1="93.5" x2="137.5" y2="93.5" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="132.5" y1="96.5" x2="136" y2="96.5" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>

  <g transform="translate(168, 48)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#1e1b4b" letter-spacing="-1.5">
      <tspan>Synthe</tspan><tspan fill="url(#prism-grad)">s</tspan><tspan>i</tspan><tspan fill="url(#prism-grad)">s</tspan><tspan>er</tspan>
    </text>
    <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="500" fill="#6366f1" letter-spacing="4.5" y="22" x="2">
      CLIENT FEEDBACK INTELLIGENCE
    </text>
  </g>
</svg>
